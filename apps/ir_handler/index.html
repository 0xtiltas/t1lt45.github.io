<body>

<div class="container">
    <header>
        <div>
            <h1>0xtiltas - <span style="color: var(--accent-purple); font-weight: 300;">IR Handler</span></h1>
            <p style="margin: 0; color: #9ca3af; font-size: 0.9em; font-family: var(--font-mono);">v1.2 // Incident Response Handler</p>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button class="btn-reset" onclick="app.resetAll()">⚠️ RESETAR TUDO</button>
            <span style="color: var(--accent-red); font-weight: bold; border: 1px solid var(--accent-red); padding: 5px 10px; border-radius: 3px; font-family: var(--font-mono); font-size: 0.85em;">TLP:AMBER</span>
        </div>
    </header>

    <div class="layout-grid">
        <div class="sidebar">
            <h3>+ SUGERIR PLAYBOOK</h3>
            <button class="btn-add" onclick="app.addCard('email')"><span class="icon">📧</span> E-mail / Phishing</button>
            <button class="btn-add" onclick="app.addCard('doc')"><span class="icon">📄</span> Documento (Office/PDF)</button>
            <button class="btn-add" onclick="app.addCard('script')"><span class="icon">📜</span> Script (PS1/JS/VBS)</button>
            <button class="btn-add" onclick="app.addCard('exe')"><span class="icon">⚙️</span> Executável (EXE/DLL)</button>
            
            <div style="border-top: 1px solid var(--border-color); margin: 15px 0;"></div>
            
            <button class="btn-add" onclick="app.addCard('triage_win')"><span class="icon">💻</span> Live Response (Win)</button>
            <button class="btn-add" onclick="app.addCard('triage_lin')"><span class="icon">🐧</span> Live Response (Linux)</button>
            
            <div style="border-top: 1px solid var(--border-color); margin: 15px 0;"></div>
            
            <button class="btn-add" onclick="app.addCard('network')"><span class="icon">🌐</span> Rede (PCAP)</button>
            <button class="btn-add" onclick="app.addCard('memory')"><span class="icon">🧠</span> Memória (Volatility)</button>
        </div>

        <div class="timeline-area" id="timelineContainer">
            <div class="empty-state" id="emptyMsg">
                <h2>Timeline Vazia</h2>
                <p>Selecione uma sugestão de playbook à esquerda para iniciar a investigação.</p>
            </div>
        </div>

        <div class="report-panel">
            <div class="report-header-bar">
                <span>RELATÓRIO DE INVESTIGAÇÃO (SUGESTÕES)</span>
                <small id="stepCounterDisplay" style="color: var(--accent-purple); font-family: var(--font-mono);">0 Sugestões</small>
            </div>
            <textarea id="finalReport" readonly></textarea>
            <div class="btn-group">
                <button class="btn-action btn-copy" onclick="app.copyReport()">📋 COPIAR TEXTO</button>
                <button class="btn-action btn-pdf" onclick="app.generatePDF()">📄 EXPORTAR PDF</button>
            </div>
        </div>
    </div>
</div>

<script type="module" src="js/app.js"></script>

</body>
